<!-- careers/admin-body.html
     Variables: BANNER_HEADLINE (layout), POSITION, USER_NAME, USER_EMAIL,
                USER_PHONE, APPLICATION_ID, RESUME_FILENAME, ACK_STATUS
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">

  <tr>
    <td style="font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
               font-size: 11px; font-weight: 500; color: #4F6BCC;
               text-transform: uppercase; letter-spacing: 0.13em;
               padding-bottom: 14px; line-height: 1.4;">
      New Application
    </td>
  </tr>

  <tr>
    <td style="font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
               font-size: 15px; line-height: 1.7; color: #111827; padding-bottom: 24px;">
      A new career application has been received through the website. The applicant details are below.
    </td>
  </tr>

  <tr>
    <td>
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
             style="background-color: #F8F9FB; border: 1px solid #E2E6EE;
                    border-radius: 6px; border-collapse: separate;">
        <tr>
          <td width="4" bgcolor="#3C4D93"
              style="width: 4px; min-width: 4px; background-color: #3C4D93;
                     background-image: linear-gradient(180deg, #332055 0%, #3C4D93 100%);
                     border-top-left-radius: 5px; border-bottom-left-radius: 5px;
                     font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;">&nbsp;</td>
          <td style="padding: 18px 20px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">

              <tr>
                <td colspan="2"
                    style="font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                           font-size: 12px; font-weight: 600; color: #111827;
                           padding-bottom: 12px; border-bottom: 1px solid #E2E6EE; line-height: 1.4;">
                  Applicant Details
                </td>
              </tr>
              <tr>
                <td colspan="2" height="12"
                    style="height: 12px; font-size: 12px; line-height: 12px; mso-line-height-rule: exactly;">&nbsp;</td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Position
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                           font-size: 13px; font-weight: 600; color: #111827; line-height: 1.55;">
                  {{POSITION}}
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Name
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                           font-size: 13px; color: #4B5563; line-height: 1.55;">
                  {{USER_NAME}}
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Email
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                           font-size: 13px; line-height: 1.55;">
                  <a href="mailto:{{USER_EMAIL}}"
                     style="color: #4F6BCC; text-decoration: none; font-weight: 500;">{{USER_EMAIL}}</a>
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Phone
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                           font-size: 13px; line-height: 1.55;">
                  <a href="tel:{{USER_PHONE}}"
                     style="color: #4F6BCC; text-decoration: none; font-weight: 500;">{{USER_PHONE}}</a>
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Reference
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 12px; color: #4B5563; line-height: 1.5;">
                  {{APPLICATION_ID}}
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px; padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Resume
                </td>
                <td class="field-value" valign="top"
                    style="padding-bottom: 10px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; color: #4B5563; line-height: 1.5;">
                  {{RESUME_FILENAME}}
                </td>
              </tr>

              <tr>
                <td class="field-label" width="96" valign="top"
                    style="width: 96px; padding-right: 16px;
                           font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; font-weight: 500; color: #9CA3AF;
                           text-transform: uppercase; letter-spacing: 0.1em;
                           white-space: nowrap; line-height: 1.5;">
                  Ack Email
                </td>
                <td class="field-value" valign="top"
                    style="font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;
                           font-size: 11px; color: #6B7280; line-height: 1.5;">
                  {{ACK_STATUS}}
                </td>
              </tr>

            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>
