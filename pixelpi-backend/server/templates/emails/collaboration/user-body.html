<!-- Body partial: collaboration/user-body.html
     Layout variables:  BANNER_HEADLINE
     Partial variables: EYEBROW, USER_NAME, COLLAB_TYPE, USER_MESSAGE
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">

  <!-- Eyebrow -->
  <tr>
    <td style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; color: #4F6BCC; font-weight: 600; letter-spacing: 0.15em; padding-bottom: 16px;">
      {{EYEBROW}}
    </td>
  </tr>

  <!-- Body copy -->
  <tr>
    <td style="font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.65; color: #111827; padding-bottom: 24px;">
      Hi {{USER_NAME}},<br><br>
      Thank you for your interest in collaborating with Pixel Pi Technologies. We've received your inquiry and our team will review it carefully. We'll be in touch to discuss next steps.
    </td>
  </tr>

  <!-- Submission summary record box -->
  <tr>
    <td style="padding-bottom: 12px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F8F9FB; border: 1px solid #E2E6EE; border-radius: 4px; border-collapse: separate;">
        <tr>
          <!-- Left accent bar -->
          <td width="4" bgcolor="#3C4D93" style="width: 4px; background-image: linear-gradient(180deg, #332055, #3C4D93); border-top-left-radius: 3px; border-bottom-left-radius: 3px; font-size: 1px; line-height: 1px;">&nbsp;</td>
          <td style="padding: 20px 24px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: 'Inter', system-ui, sans-serif; font-size: 13px; color: #111827; line-height: 1.5; padding-bottom: 14px; border-bottom: 1px solid #E2E6EE;">
                  <strong>Submitted Brief Parameters:</strong>
                </td>
              </tr>
              <tr>
                <td style="padding-top: 14px;">
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                      <td valign="top" style="width: 25%; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #9CA3AF; padding-bottom: 8px;">TRACK</td>
                      <td valign="top" style="font-family: 'Inter', system-ui, sans-serif; font-size: 13px; color: #4B5563; padding-bottom: 8px;">{{COLLAB_TYPE}}</td>
                    </tr>
                    <tr>
                      <td valign="top" style="width: 25%; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #9CA3AF;">SCOPE</td>
                      <td valign="top" style="font-family: 'Inter', system-ui, sans-serif; font-size: 13px; color: #4B5563; line-height: 1.5;">{{USER_MESSAGE}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>
